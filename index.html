<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link href="./Style.css" rel="stylesheet">
</head>
<body>
    <div class="main-box">
        <h1>Rock Paper Scissors</h1>
        <div class="score-board">
            <div class="score" id="user-score">0</div>
            <div class="score" id="comp-score">0</div>
        </div>
        <div class="choices">
            <div class="choice" id="rock">👊</div>
            <div class="choice" id="paper">✋</div>
            <div class="choice" id="scissors">✌️</div>
        </div>

        <button class="reset-btn" id="reset">Reset Game</button>
    </div>
    <script src="./Script.js"></script>
</body>
</html>
